services:
  obsidian-sync:
    build: ./obsidian-sync
    container_name: obsidian-sync
    restart: unless-stopped
    volumes:
      - vault-data:/vault
      - obsidian-config:/root/.config/obsidian-headless
    environment:
      - OBSIDIAN_AUTH_TOKEN=${OBSIDIAN_AUTH_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'ob sync --continuous --path /vault'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  agent:
    build: ./agent
    container_name: lazylogger-agent
    restart: unless-stopped
    volumes:
      - vault-data:/vault
    env_file:
      - .env
    environment:
      - MCP_VAULT_PATH=/vault
      - SYSTEM_PROMPT_PATH=/app/system_prompt.md
    depends_on:
      obsidian-sync:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  vault-data:
  obsidian-config:
